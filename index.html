  <body style="margin:0;background:#0B0F1A;">
    <style>
      #mvni-boot-fallback{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0B0F1A 0%,#131A2E 100%);color:#E5E7EB;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;padding:24px;z-index:1;}
      #mvni-boot-fallback .card{max-width:460px;width:100%;background:transparent;border:0;padding:28px;text-align:center;display:flex;flex-direction:column;gap:18px;align-items:center;}
      #mvni-boot-fallback .tag{font-size:11px;letter-spacing:.24em;color:#9b87f5;text-transform:uppercase;font-weight:600;}
      #mvni-boot-fallback h1{font-size:15px;font-weight:500;margin:0;color:#E5E7EB;opacity:.75;}
      #mvni-boot-fallback p{font-size:13px;color:#9CA3AF;margin:0;line-height:1.5;display:none;}
      #mvni-boot-fallback .actions{display:none;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:6px;}
      #mvni-boot-fallback a,#mvni-boot-fallback button{padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;cursor:pointer;border:1px solid #3f3f46;background:transparent;color:#E5E7EB;font-family:inherit;}
      #mvni-boot-fallback a.primary{background:#9b87f5;border-color:#9b87f5;color:#fff;}
      #mvni-boot-fallback.mvni-timeout .card{background:rgba(17,24,39,.85);border:1px solid #262f45;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.45);}
      #mvni-boot-fallback.mvni-timeout h1{font-size:20px;font-weight:600;opacity:1;color:#F9FAFB;}
      #mvni-boot-fallback.mvni-timeout p{display:block;}
      #mvni-boot-fallback.mvni-timeout .actions{display:flex;}
      #mvni-boot-fallback .spinner{width:28px;height:28px;border:2px solid rgba(155,135,245,.2);border-top-color:#9b87f5;border-radius:50%;animation:mvni-spin .9s linear infinite;}
      @keyframes mvni-spin{to{transform:rotate(360deg);}}
    </style>
    <div id="root">
      <div id="mvni-boot-fallback">
        <div class="card">
          <div class="tag">MVNI HUB</div>
          <div class="spinner"></div>
          <h1 id="mvni-boot-title">Carregando…</h1>
          <p id="mvni-boot-message">Se esta mensagem permanecer, tente recarregar ou abra o diagnóstico para verificar o ambiente.</p>
          <div class="actions">
            <a class="primary" href="/diagnostico">Abrir diagnóstico</a>
            <a href="/auth">Ir para login</a>
            <button type="button" onclick="window.location.reload()">Recarregar</button>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        try {
          window.__MVNI_BOOT_START__ = Date.now();
          window.__MVNI_REACT_READY__ = false;
          setTimeout(function () {
            if (window.__MVNI_REACT_READY__) return;
            var fb = document.getElementById("mvni-boot-fallback");
            if (!fb) return;
            fb.classList.add("mvni-timeout");
            var t = document.getElementById("mvni-boot-title");
            if (t) t.textContent = "O MVNI HUB está demorando para carregar";
          }, 25000);
        } catch (e) { /* noop */ }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
